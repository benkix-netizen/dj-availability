<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LKF Bar — Roster</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #050505;
    color: #fff;
    min-height: 100vh;
    padding: 0 0 2rem 0;
  }
  .page-wrap { max-width: 700px; margin: 0 auto; padding: 0 1rem; }
  .header {
    background: #1a4a2e;
    padding: 1.25rem 1.75rem;
    margin-bottom: 1.5rem;
  }
  .header h1 {
    font-size: 20px; font-weight: 700; color: #FFD700;
    margin: 0 0 4px; display: flex; align-items: center; gap: 8px;
  }
  .header p { font-size: 13px; color: #a8d4b8; margin: 0; }
  .form-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px; font-size: 12px; font-weight: 600;
    color: #FFD700; text-decoration: none; letter-spacing: 0.3px;
  }
  .form-link:hover { text-decoration: underline; }
  .field-row { margin-bottom: 1.5rem; }
  .field-row label {
    display: block; font-size: 12px; font-weight: 600;
    color: #FFD700; margin-bottom: 6px;
    letter-spacing: 0.8px; text-transform: uppercase;
  }
  .field-row select {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid #2a5a3a; border-radius: 8px;
    background: #143d25; color: #fff; font-family: inherit; outline: none;
    appearance: none; -webkit-appearance: none;
  }
  .field-row select:focus { border-color: #FFD700; }
  .month-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .month-chip {
    padding: 6px 16px; font-size: 13px; border: 1px solid #2a5a3a;
    border-radius: 999px; cursor: pointer; background: #143d25;
    color: #a8d4b8; font-family: inherit; transition: all 0.12s;
  }
  .month-chip.active {
    background: #FFD700; border-color: #FFD700;
    color: #0f2a1a; font-weight: 600;
  }
  .status-msg { font-size: 14px; color: #a8d4b8; text-align: center; padding: 2rem 0; }
  .err-banner {
    font-size: 13px; color: #ff8080; background: #3a0000;
    border: 1px solid #8B2020; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 1.25rem; display: none;
  }
  .err-banner.show { display: block; }
  .my-sets-bar {
    display: none; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    background: #143d25; border: 1px solid #2a5a3a; border-radius: 10px;
    padding: 0.9rem 1.1rem; margin-bottom: 1.5rem;
  }
  .my-sets-bar.show { display: flex; }
  .my-sets-bar .msg { font-size: 13px; color: #a8d4b8; }
  .cal-btn {
    font-size: 12px; font-weight: 700; padding: 9px 16px; border: 2px solid #FFD700;
    border-radius: 8px; cursor: pointer; background: #1a4a2e; color: #FFD700;
    font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.12s; white-space: nowrap;
  }
  .cal-btn:hover:not(:disabled) { background: #FFD700; color: #1a4a2e; }
  .cal-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .cal-btn.small { font-size: 11px; padding: 6px 12px; border-width: 1px; }
  .cal-btn.swap { border-color: #ffb74d; color: #ffb74d; background: #1a4a2e; }
  .cal-btn.swap:hover:not(:disabled) { background: #ffb74d; color: #1a4a2e; }
  .day-card {
    border: 1px solid #2a5a3a; border-radius: 10px;
    padding: 1rem 1.25rem; margin-bottom: 1rem; background: #143d25;
  }
  .day-title {
    font-size: 14px; font-weight: 600; color: #FFD700;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .day-title i { font-size: 16px; color: #5aad70; }
  .set-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-top: 1px solid #1e5030; gap: 12px; flex-wrap: wrap;
  }
  .set-info { display: flex; flex-direction: column; gap: 2px; }
  .set-label { font-size: 13px; color: #a8d4b8; }
  .set-dj { font-size: 13px; font-weight: 600; color: #fff; }
  .set-dj.unassigned { color: #5a7a68; font-weight: 400; font-style: italic; }
  .set-row.mine { background: rgba(255, 215, 0, 0.06); border-radius: 6px; padding-left: 8px; padding-right: 8px; }
  .set-row.mine .set-dj { color: #FFD700; }
  .set-row.dimmed { opacity: 0.45; }
  .no-email-note { font-size: 11px; color: #ff8080; }
  .swap-badge {
    display: inline-flex; align-items: center; gap: 4px; width: fit-content;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    color: #ffb74d; background: rgba(255, 183, 77, 0.12);
    border: 1px solid rgba(255, 183, 77, 0.4); border-radius: 999px; padding: 2px 8px;
  }
  .volunteer-list { font-size: 11px; color: #a8d4b8; }
  .swap-status { font-size: 11px; color: #ffb74d; }
  .cal-btn.report { border-color: #6ec6ff; color: #6ec6ff; background: #1a4a2e; }
  .cal-btn.report:hover:not(:disabled) { background: #6ec6ff; color: #0f2a1a; }
  .time-report-wrap { width: 100%; margin-top: 6px; }
  .time-report-form {
    display: none; flex-wrap: wrap; align-items: flex-end; gap: 10px;
    background: #0f2a1a; border: 1px solid #2a5a3a; border-radius: 8px;
    padding: 10px 12px; margin-top: 8px;
  }
  .time-report-form.show { display: flex; }
  .time-report-form label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 11px; color: #a8d4b8; letter-spacing: 0.3px;
  }
  .time-report-form input {
    background: #143d25; border: 1px solid #2a5a3a; border-radius: 6px;
    color: #fff; font-family: inherit; font-size: 13px; padding: 6px 8px;
  }
  .time-report-form input[type="text"] { min-width: 160px; }
  .tr-status { font-size: 11px; color: #6ec6ff; }
  .promo-section { margin-top: 1.75rem; }
  .promo-label {
    font-size: 12px; font-weight: 600; color: #FFD700;
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px;
  }
  .promo-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .promo-btn-dates { opacity: 0.7; font-weight: 400; }
</style>
</head>
<body>
  <div class="page-wrap">
    <div class="header">
      <h1><i class="ti ti-calendar-event"></i> LKF Bar — Roster</h1>
      <p>Who's playing when. Pick your name to grab calendar invites for your sets.</p>
      <a class="form-link" href="index.html"><i class="ti ti-send"></i> Submit Availability</a>
    </div>

    <div class="month-picker" id="month-picker"></div>

    <div class="err-banner" id="err-banner">Couldn't load the roster from the sheet. Please try again shortly.</div>
    <div class="status-msg" id="status-msg"><i class="ti ti-loader"></i> Loading roster…</div>

    <div id="content" style="display:none">
      <div class="field-row">
        <label>Your name</label>
        <select id="dj-picker">
          <option value="">— None selected —</option>
          <option value="Bunni">Bunni</option>
          <option value="Nam">Nam</option>
          <option value="K-Otic">K-Otic</option>
          <option value="Mu">Mu</option>
          <option value="Nova">Nova</option>
          <option value="Slender">Slender</option>
          <option value="Lance">Lance</option>
          <option value="Buttons">Buttons</option>
          <option value="Claz">Claz</option>
          <option value="Sef">Sef</option>
        </select>
      </div>

      <div class="my-sets-bar" id="my-sets-bar">
        <span class="msg" id="my-sets-msg"></span>
        <button class="cal-btn" id="add-all-btn"><i class="ti ti-calendar-plus"></i> Add all my sets to Calendar</button>
      </div>

      <div id="roster-board"></div>

      <div class="promo-section" id="promo-section">
        <div class="promo-label">Share this month</div>
        <div class="promo-buttons" id="promo-buttons"></div>
      </div>
    </div>
  </div>

<script>
  const SHEET_ID = "18k60OYTIlCBkWXOLs4rSb-NsxnWrjwNsQlfjnWpqZwA";
  const ROSTER_SHEET_PREFIX = "Roster - "; // generateRoster() writes a new tab per month, e.g. "Roster - July 2026"
  const AVAILABILITY_GID = "406805328";
  const SWAP_SHEET_NAME = "SwapRequests"; // no fixed gid yet -- created on first use, so fetched by name
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPEaIosP4j_ckgE3Nr9Lnm71YhpTEGiaTbT-Qs1KDPITXkS9XeHVl0OMRoFVyPZOW-/exec";
  const ORGANIZER_EMAIL = "benki@redlineartistry.com";
  const ORGANIZER_NAME = "LKF Bar";
  const VENUE_NAME = "LKF Bar";
  const TIME_ZONE = "Australia/Melbourne";
  const MONTH_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function csvUrl(gid) {
    // headers=1 stops gviz from auto-merging the "Month: ..." title row into the header row.
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&headers=1`;
  }

  function csvUrlBySheetName(name) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&headers=1`;
  }

  // Minimal CSV parser: handles quoted fields, embedded commas, and "" escaped quotes.
  function parseCsv(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field); field = "";
      } else if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        row.push(field); field = "";
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
    if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(cell => cell !== ""));
  }

  async function fetchCsv(gid) {
    const res = await fetch(csvUrl(gid));
    if (!res.ok) throw new Error(`Sheet fetch failed (${res.status})`);
    return parseCsv(await res.text());
  }

  // For tabs with no fixed gid (e.g. auto-created on first use). Returns []
  // instead of throwing if the tab doesn't exist yet -- treated as "no data".
  async function fetchCsvBySheetName(name) {
    try {
      const res = await fetch(csvUrlBySheetName(name));
      if (!res.ok) return [];
      const rows = parseCsv(await res.text());
      // gviz returns an HTML error page (not CSV) for a sheet name that doesn't exist.
      if (rows.length && /<html/i.test(rows[0][0] || "")) return [];
      return rows;
    } catch (err) {
      return [];
    }
  }

  function indexHeader(headerRow) {
    const idx = {};
    headerRow.forEach((name, i) => { idx[name.trim()] = i; });
    return idx;
  }

  function to12hLabel(hour, minute) {
    const period = hour >= 12 ? "pm" : "am";
    let h12 = hour % 12;
    if (h12 === 0) h12 = 12;
    return minute === 0 ? `${h12}${period}` : `${h12}:${String(minute).padStart(2, "0")}${period}`;
  }

  function parseTimeCell24(str) {
    const m = /^(\d{1,2}):(\d{2})/.exec(String(str).trim());
    if (!m) return null;
    return { hour: parseInt(m[1], 10), minute: parseInt(m[2], 10) };
  }

  // True only if the fetched tab's merged title cell actually matches the
  // month we asked for -- gviz silently falls back to the spreadsheet's
  // FIRST tab when a sheet name doesn't exist, so a plain "did it error?"
  // check isn't enough to tell a missing month apart from a real one.
  function rosterMonthMatches(rows, monthLabel) {
    const title = (rows[0] && rows[0][0] || "").trim().toUpperCase();
    return title === monthLabel.toUpperCase();
  }

  // Parses the week-by-week planning grid generateRoster() writes to
  // "Roster - <Month>": WEEK header rows, then one row per set with real
  // Start/Finish time cells and an Assigned DJ dropdown, followed by a
  // trailing per-DJ stats block. We stop as soon as a row doesn't look like
  // a week header or a date row ("Thursday, 2 July"), which is exactly
  // where that stats block begins.
  function parseGridSlots(rows, requestedMonthIdx, requestedYear) {
    const slots = [];
    for (let i = 2; i < rows.length; i++) {
      const r = rows[i];
      const colA = (r[0] || "").trim();
      if (colA === "") continue;
      if (/^WEEK\s+\d+$/i.test(colA)) continue;
      if (!colA.includes(",")) break;

      // Boundary nights near a month's end are stored with their real month
      // name (e.g. "Saturday, 1 August" inside the "Roster - July 2026"
      // tab), not the requested month -- read it from the row itself rather
      // than assuming every row belongs to the tab's nominal month.
      const [dayName, datePart] = colA.split(",").map(s => s.trim());
      const dm = /^(\d{1,2})\s+([A-Za-z]+)$/.exec(datePart || "");
      if (!dm) continue;
      const dayNum = parseInt(dm[1], 10);
      const monthIdx = MONTHS.indexOf(dm[2]);
      if (monthIdx === -1) continue;
      const year = monthIdx < requestedMonthIdx ? requestedYear + 1 : requestedYear;

      const start = parseTimeCell24(r[1]);
      const end = parseTimeCell24(r[2]);
      if (!start || !end) continue;

      slots.push({
        dateLabel: `${dayNum} ${MONTH_ABBR[monthIdx]}`,
        day: dayName,
        setTime: `${to12hLabel(start.hour, start.minute)} – ${to12hLabel(end.hour, end.minute)}`,
        assignedDJ: (r[4] || "").trim(),
        dayNum, monthIdx, year
      });
    }
    return slots;
  }

  function buildEmailMap(rows) {
    const idx = indexHeader(rows[0]);
    const map = {};
    if (!("Email" in idx)) return map; // Apps Script not updated yet / no submissions with email
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const name = (r[idx["DJ name"]] || "").trim();
      const email = (r[idx["Email"]] || "").trim();
      if (name && email) map[name] = email; // later rows overwrite earlier ones (most recent wins)
    }
    return map;
  }

  // Parses "8:30pm", "9pm", "12am" -> 24h {hour, minute}
  function parseClock12(str) {
    const m = /^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i.exec(str.trim());
    if (!m) return null;
    let hour = parseInt(m[1], 10) % 12;
    if (/pm/i.test(m[3])) hour += 12;
    return { hour, minute: m[2] ? parseInt(m[2], 10) : 0 };
  }

  // Nightclub hours run ~6pm-6am; anything before 6am belongs to the day after dayNum.
  function clockToDate(clock, dayNum, monthIdx, year) {
    const dayOffset = clock.hour < 6 ? 1 : 0;
    return { dayNum: dayNum + dayOffset, monthIdx, year, hour: clock.hour, minute: clock.minute };
  }

  function tzOffsetMinutes(date, timeZone) {
    const dtf = new Intl.DateTimeFormat("en-US", {
      timeZone, hourCycle: "h23",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
    const parts = Object.fromEntries(dtf.formatToParts(date).map(p => [p.type, p.value]));
    const asUTC = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
    return (asUTC - date.getTime()) / 60000;
  }

  // Converts a Melbourne local wall-clock time to the correct UTC Date instant (DST-aware).
  function melbourneLocalToUtc({ dayNum, monthIdx, year, hour, minute }) {
    const guess = Date.UTC(year, monthIdx, dayNum, hour, minute);
    const offsetMin = tzOffsetMinutes(new Date(guess), TIME_ZONE);
    return new Date(guess - offsetMin * 60000);
  }

  function parseSlotTimes(slot) {
    const [startStr, endStr] = slot.setTime.split(/[–-]/).map(s => s.trim());
    const startClock = parseClock12(startStr);
    const endClock = parseClock12(endStr);
    if (!startClock || !endClock) return null;
    const startLocal = clockToDate(startClock, slot.dayNum, slot.monthIdx, slot.year);
    const endLocal = clockToDate(endClock, slot.dayNum, slot.monthIdx, slot.year);
    return { start: melbourneLocalToUtc(startLocal), end: melbourneLocalToUtc(endLocal) };
  }

  function icsDate(date) {
    return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  }

  function icsEscape(str) {
    return String(str).replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;");
  }

  function buildVevent(slot, djName, djEmail) {
    const times = parseSlotTimes(slot);
    if (!times) return null;
    const uid = `${slot.year}${slot.monthIdx}${slot.dayNum}-${icsEscape(slot.setTime)}-${icsEscape(djName)}@dj-availability.lkfbar`;
    return [
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${icsDate(new Date())}`,
      `DTSTART:${icsDate(times.start)}`,
      `DTEND:${icsDate(times.end)}`,
      `SUMMARY:${icsEscape(VENUE_NAME)} — ${icsEscape(djName)} set`,
      `LOCATION:${icsEscape(VENUE_NAME)}`,
      `ORGANIZER;CN=${icsEscape(ORGANIZER_NAME)}:mailto:${ORGANIZER_EMAIL}`,
      `ATTENDEE;CN=${icsEscape(djName)};RSVP=TRUE:mailto:${djEmail}`,
      "STATUS:CONFIRMED",
      "END:VEVENT"
    ].join("\r\n");
  }

  function buildIcs(vevents) {
    return [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//LKF Bar//Roster//EN",
      "CALSCALE:GREGORIAN",
      ...vevents,
      "END:VCALENDAR"
    ].join("\r\n");
  }

  function downloadIcs(filename, vevents) {
    const blob = new Blob([buildIcs(vevents)], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function slugify(str) {
    return String(str).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  }

  // Reporting only makes sense once a set has actually happened.
  function slotHasPassed(slot) {
    const slotDate = new Date(slot.year, slot.monthIdx, slot.dayNum);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return slotDate <= today;
  }

  function buildTimeReportUi(slot, selectedDJ) {
    const wrap = document.createElement("div");
    wrap.className = "time-report-wrap";

    const btn = document.createElement("button");
    btn.className = "cal-btn report small";
    btn.innerHTML = '<i class="ti ti-clock"></i> Report Actual Time';

    const form = document.createElement("div");
    form.className = "time-report-form";
    form.innerHTML = `
      <label>Actual start <input type="time" class="tr-start"></label>
      <label>Actual end <input type="time" class="tr-end"></label>
      <label>Note (optional) <input type="text" class="tr-note" placeholder="e.g. crowd wanted more"></label>
      <button class="cal-btn small tr-submit">Submit</button>
      <span class="tr-status"></span>
    `;

    btn.onclick = () => form.classList.toggle("show");

    form.querySelector(".tr-submit").onclick = async () => {
      const startVal = form.querySelector(".tr-start").value;
      const endVal = form.querySelector(".tr-end").value;
      const noteVal = form.querySelector(".tr-note").value.trim();
      const statusEl = form.querySelector(".tr-status");
      if (!startVal || !endVal) { statusEl.textContent = "Enter both times."; return; }

      const submitBtn = form.querySelector(".tr-submit");
      submitBtn.disabled = true;
      const monthLabel = `${MONTHS[slot.monthIdx]} ${slot.year}`;
      await postToScript({
        action: "reportTime",
        djName: selectedDJ, month: monthLabel, date: slot.dateLabel, day: slot.day,
        scheduledSetTime: slot.setTime, actualStart: startVal, actualEnd: endVal, note: noteVal
      });
      statusEl.textContent = "Reported — thanks!";
      form.querySelector(".tr-start").disabled = true;
      form.querySelector(".tr-end").disabled = true;
      form.querySelector(".tr-note").disabled = true;
    };

    wrap.appendChild(btn);
    wrap.appendChild(form);
    return wrap;
  }

  function escapeXml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Same "3 nights per week" chunking generateRoster() uses server-side.
  function groupSlotsIntoWeeks(slots) {
    const byDate = [];
    const seen = {};
    slots.forEach(slot => {
      const key = `${slot.dateLabel}-${slot.day}`;
      if (!(key in seen)) {
        seen[key] = byDate.length;
        byDate.push({ dateLabel: slot.dateLabel, day: slot.day, slots: [] });
      }
      byDate[seen[key]].slots.push(slot);
    });
    const weeks = [];
    for (let i = 0; i < byDate.length; i += 3) weeks.push(byDate.slice(i, i + 3));
    return weeks;
  }

  // 1080x1920 (Instagram Story). Uses system fonts, not the Google Fonts used
  // elsewhere on the page -- custom @import fonts inside an SVG often fail to
  // load when rasterized via <img>+canvas, so this favours reliability.
  function buildStorySvg(weekNights, weekLabel, monthLabel) {
    const W = 1080, H = 1920;
    const lines = [];
    let y = 490;

    weekNights.forEach(night => {
      lines.push(`<text x="90" y="${y}" font-family="Georgia, serif" font-weight="700" font-size="46" fill="#FFD700">${escapeXml(night.day)}, ${escapeXml(night.dateLabel)}</text>`);
      y += 20;
      lines.push(`<line x1="90" y1="${y}" x2="990" y2="${y}" stroke="#2a5a3a" stroke-width="2"/>`);
      y += 56;
      night.slots.forEach(slot => {
        const djName = slot.assignedDJ || "Unassigned";
        const djColor = slot.assignedDJ ? "#ffffff" : "#5a7a68";
        const djStyle = slot.assignedDJ ? "" : ' font-style="italic"';
        lines.push(`<text x="90" y="${y}" font-family="Segoe UI, sans-serif" font-size="32" fill="#a8d4b8">${escapeXml(slot.setTime)}</text>`);
        lines.push(`<text x="990" y="${y}" text-anchor="end" font-family="Segoe UI, sans-serif" font-weight="700" font-size="34" fill="${djColor}"${djStyle}>${escapeXml(djName)}</text>`);
        y += 62;
      });
      y += 56;
    });

    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="storyBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a0f0c"/>
          <stop offset="100%" stop-color="#020302"/>
        </linearGradient>
      </defs>
      <rect width="${W}" height="${H}" fill="url(#storyBg)"/>
      <g stroke="#FFD700" stroke-width="3" fill="none" opacity="0.85">
        <path d="M 50 170 V 90 Q 50 60 80 60 H 160"/>
        <path d="M 920 60 H 1000 Q 1030 60 1030 90 V 170"/>
        <path d="M 1030 ${H - 170} V ${H - 90} Q 1030 ${H - 60} 1000 ${H - 60} H 920"/>
        <path d="M 160 ${H - 60} H 80 Q 50 ${H - 60} 50 ${H - 90} V ${H - 170}"/>
      </g>
      <text x="540" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="28" letter-spacing="6" fill="#FFD700">LKF BAR</text>
      <text x="540" y="290" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="72" fill="#ffffff">${escapeXml(monthLabel)}</text>
      <text x="540" y="360" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="34" letter-spacing="4" fill="#FFD700">${escapeXml(weekLabel.toUpperCase())}</text>
      <line x1="440" y1="410" x2="640" y2="410" stroke="#FFD700" stroke-width="2"/>
      ${lines.join("\n      ")}
      <text x="540" y="${H - 90}" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" fill="#a8d4b8">Full roster: benkix-netizen.github.io/dj-availability/roster.html</text>
    </svg>`;
  }

  function downloadStoryPng(svgString, filename) {
    const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 1080; canvas.height = 1920;
      canvas.getContext("2d").drawImage(img, 0, 0, 1080, 1920);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const pngUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = pngUrl; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(pngUrl);
      }, "image/png");
    };
    img.onerror = () => { console.error("Failed to render story image"); URL.revokeObjectURL(url); };
    img.src = url;
  }

  function initPromoButtons(slots, monthLabel) {
    const container = document.getElementById("promo-buttons");
    const weeks = groupSlotsIntoWeeks(slots);
    weeks.forEach((weekNights, i) => {
      const first = weekNights[0].dateLabel;
      const last = weekNights[weekNights.length - 1].dateLabel;
      const dateRange = first === last ? first : `${first} – ${last}`;
      const filenameDates = first === last ? slugify(first) : `${slugify(first)}-to-${slugify(last)}`;

      const btn = document.createElement("button");
      btn.className = "cal-btn small";
      btn.innerHTML = `<i class="ti ti-download"></i> Week ${i + 1} <span class="promo-btn-dates">(${dateRange})</span>`;
      btn.onclick = () => {
        const svg = buildStorySvg(weekNights, `Week ${i + 1}`, monthLabel);
        downloadStoryPng(svg, `LKF-Bar-${slugify(monthLabel)}-${filenameDates}.png`);
      };
      container.appendChild(btn);
    });
  }

  // Only "open" requests matter here -- once the owner reassigns the slot in
  // the Roster tab and flips Status to "resolved" in the sheet, it drops out
  // of this map and disappears from the page on the next load.
  function parseSwapMap(rows) {
    const map = {};
    if (!rows || rows.length === 0) return map;
    const idx = indexHeader(rows[0]);
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if ((r[idx["Status"]] || "").trim() !== "open") continue;
      const date = (r[idx["Date"]] || "").trim();
      const setTime = (r[idx["Set time"]] || "").trim();
      const requestedBy = (r[idx["DJ name"]] || "").trim();
      const month = (r[idx["Month"]] || "").trim();
      const day = (r[idx["Day"]] || "").trim();
      const volunteers = (r[idx["Volunteers"]] || "").split(",").map(s => s.trim()).filter(Boolean);
      map[`${date}|${setTime}`] = { requestedBy, month, day, setTime, date, volunteers };
    }
    return map;
  }

  // Fire-and-forget, same as the availability form's submit -- Apps Script
  // Web Apps don't reliably send CORS headers on POST responses, so we post
  // with no-cors (opaque response) and update the UI optimistically.
  async function postToScript(payload) {
    await fetch(SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  }

  // Roster data is reloaded whenever the DJ picks a different month, so it
  // lives in mutable module-scope state rather than being captured once in
  // a closure -- render() and the my-sets summary both read the latest
  // values, and the dj-picker's change listener is wired up exactly once
  // (see initControls()) instead of being re-attached on every month switch.
  let currentSlots = [];
  let currentEmailMap = {};
  let currentSwapMap = {};

  function render(selectedDJ) {
    const board = document.getElementById("roster-board");
    board.innerHTML = "";

    // Group slots by dateLabel+day, in sheet order.
    const byDate = [];
    const dateIndex = {};
    currentSlots.forEach(slot => {
      const key = `${slot.dateLabel}-${slot.day}`;
      if (!(key in dateIndex)) {
        dateIndex[key] = byDate.length;
        byDate.push({ dateLabel: slot.dateLabel, day: slot.day, slots: [] });
      }
      byDate[dateIndex[key]].slots.push(slot);
    });

    const emailMap = currentEmailMap, swapMap = currentSwapMap;
    byDate.forEach(group => {
        const card = document.createElement("div");
        card.className = "day-card";
        card.innerHTML = `<div class="day-title"><i class="ti ti-calendar-event"></i>${group.day}, ${group.dateLabel}</div>`;
        group.slots.forEach(slot => {
          const isMine = selectedDJ && slot.assignedDJ === selectedDJ;
          const swapKey = `${slot.dateLabel}|${slot.setTime}`;
          const openSwap = swapMap[swapKey];
          const row = document.createElement("div");
          row.className = "set-row" + (isMine ? " mine" : selectedDJ ? " dimmed" : "");
          const djLabel = slot.assignedDJ
            ? `<span class="set-dj">${slot.assignedDJ}</span>`
            : `<span class="set-dj unassigned">Unassigned</span>`;
          row.innerHTML = `
            <div class="set-info">
              <span class="set-label">${slot.setTime}</span>
              ${djLabel}
              ${openSwap ? '<span class="swap-badge">🔁 Needs coverage</span>' : ''}
              ${openSwap && openSwap.volunteers.length ? `<span class="volunteer-list">Volunteered: ${openSwap.volunteers.join(", ")}</span>` : ''}
            </div>`;

          if (isMine) {
            const email = emailMap[selectedDJ];
            if (email) {
              const btn = document.createElement("button");
              btn.className = "cal-btn small";
              btn.innerHTML = '<i class="ti ti-calendar-plus"></i> Add to Calendar';
              btn.onclick = () => {
                const vevent = buildVevent(slot, selectedDJ, email);
                if (vevent) downloadIcs(`LKF-Bar-${slugify(selectedDJ)}-${slugify(slot.dateLabel)}.ics`, [vevent]);
              };
              row.appendChild(btn);
            } else {
              const note = document.createElement("span");
              note.className = "no-email-note";
              note.textContent = "No email on file yet";
              row.appendChild(note);
            }

            if (openSwap) {
              const status = document.createElement("span");
              status.className = "swap-status";
              status.textContent = "Coverage requested — waiting for a volunteer";
              row.appendChild(status);
            } else {
              const swapBtn = document.createElement("button");
              swapBtn.className = "cal-btn swap small";
              swapBtn.innerHTML = '<i class="ti ti-flag"></i> Need Coverage';
              swapBtn.onclick = async () => {
                swapBtn.disabled = true;
                const monthLabel = `${MONTHS[slot.monthIdx]} ${slot.year}`;
                await postToScript({
                  action: "requestCoverage",
                  djName: selectedDJ, month: monthLabel, date: slot.dateLabel, day: slot.day, setTime: slot.setTime
                });
                swapMap[swapKey] = { requestedBy: selectedDJ, month: monthLabel, day: slot.day, setTime: slot.setTime, date: slot.dateLabel, volunteers: [] };
                render(selectedDJ);
              };
              row.appendChild(swapBtn);
            }
          } else if (openSwap && selectedDJ && slot.assignedDJ !== selectedDJ) {
            const alreadyVolunteered = openSwap.volunteers.includes(selectedDJ);
            const volBtn = document.createElement("button");
            volBtn.className = "cal-btn swap small";
            if (alreadyVolunteered) {
              volBtn.innerHTML = '<i class="ti ti-check"></i> You volunteered';
              volBtn.disabled = true;
            } else {
              volBtn.innerHTML = "I can cover this";
              volBtn.onclick = async () => {
                volBtn.disabled = true;
                await postToScript({
                  action: "volunteer",
                  djName: selectedDJ, month: openSwap.month, date: openSwap.date, day: openSwap.day, setTime: openSwap.setTime
                });
                openSwap.volunteers.push(selectedDJ);
                render(selectedDJ);
              };
            }
            row.appendChild(volBtn);
          }

          card.appendChild(row);
          if (isMine && slotHasPassed(slot)) {
            card.appendChild(buildTimeReportUi(slot, selectedDJ));
          }
        });
        board.appendChild(card);
    });
  }

  function updateMySetsBar(selectedDJ) {
    const myBar = document.getElementById("my-sets-bar");
    const myMsg = document.getElementById("my-sets-msg");
    const addAllBtn = document.getElementById("add-all-btn");

    if (!selectedDJ) { myBar.classList.remove("show"); return; }

    const mySlots = currentSlots.filter(s => s.assignedDJ === selectedDJ);
    const email = currentEmailMap[selectedDJ];
    myBar.classList.add("show");

    if (mySlots.length === 0) {
      myMsg.textContent = "You don't have any sets on this roster yet.";
      addAllBtn.style.display = "none";
    } else if (!email) {
      myMsg.textContent = `${mySlots.length} set${mySlots.length === 1 ? "" : "s"} — no email on file yet. Submit your next availability form to enable calendar invites.`;
      addAllBtn.style.display = "none";
    } else {
      myMsg.textContent = `You have ${mySlots.length} set${mySlots.length === 1 ? "" : "s"} on this roster.`;
      addAllBtn.style.display = "inline-flex";
      addAllBtn.onclick = () => {
        const vevents = mySlots.map(s => buildVevent(s, selectedDJ, email)).filter(Boolean);
        downloadIcs(`LKF-Bar-${slugify(selectedDJ)}-all-sets.ics`, vevents);
      };
    }
  }

  // Wired up exactly once -- month switches only replace currentSlots/etc.
  // and re-render, they never touch this listener.
  function initControls() {
    const picker = document.getElementById("dj-picker");
    picker.addEventListener("change", () => {
      const selectedDJ = picker.value;
      render(selectedDJ);
      updateMySetsBar(selectedDJ);
    });
  }

  function buildMonthChips() {
    const now = new Date();
    const wrap = document.getElementById("month-picker");
    wrap.innerHTML = "";
    const chips = [];
    for (let i = -1; i <= 2; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      chips.push({ monthIdx: d.getMonth(), year: d.getFullYear(), label: `${MONTHS[d.getMonth()]} ${d.getFullYear()}` });
    }
    chips.forEach((chip, i) => {
      const btn = document.createElement("button");
      btn.className = "month-chip" + (i === 1 ? " active" : ""); // i===1 is "this month"
      btn.textContent = chip.label;
      btn.onclick = () => {
        document.querySelectorAll(".month-chip").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        loadMonth(chip.label, chip.monthIdx, chip.year);
      };
      wrap.appendChild(btn);
    });
    return chips[1]; // default to "this month"
  }

  async function loadMonth(monthLabel, monthIdx, year) {
    const statusMsg = document.getElementById("status-msg");
    const errBanner = document.getElementById("err-banner");
    const content = document.getElementById("content");
    errBanner.classList.remove("show");
    content.style.display = "none";
    statusMsg.style.display = "block";
    statusMsg.innerHTML = `<i class="ti ti-loader"></i> Loading ${monthLabel}…`;

    const rosterRows = await fetchCsvBySheetName(ROSTER_SHEET_PREFIX + monthLabel);
    if (rosterRows.length === 0 || !rosterMonthMatches(rosterRows, monthLabel)) {
      statusMsg.textContent = `No roster generated for ${monthLabel} yet.`;
      return;
    }

    currentSlots = parseGridSlots(rosterRows, monthIdx, year);
    statusMsg.style.display = "none";
    content.style.display = "block";

    const picker = document.getElementById("dj-picker");
    render(picker.value);
    updateMySetsBar(picker.value);
    initPromoButtons(currentSlots, monthLabel);
  }

  async function main() {
    try {
      const [availabilityRows, swapRows] = await Promise.all([
        fetchCsv(AVAILABILITY_GID),
        fetchCsvBySheetName(SWAP_SHEET_NAME)
      ]);
      currentEmailMap = buildEmailMap(availabilityRows);
      currentSwapMap = parseSwapMap(swapRows);
      initControls();
      const defaultChip = buildMonthChips();
      await loadMonth(defaultChip.label, defaultChip.monthIdx, defaultChip.year);
    } catch (err) {
      console.error(err);
      document.getElementById("status-msg").style.display = "none";
      const banner = document.getElementById("err-banner");
      banner.classList.add("show");
    }
  }

  main();
</script>
